name: Auto-Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/auto-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1.0"
            CHANGELOG="Initial release"
          else
            COMMITS=$(git log "${LATEST}..HEAD" --pretty=format:"%s" --no-merges)
            if echo "$COMMITS" | grep -qE "BREAKING[- ]CHANGE|^[a-z]+(\(.+\))?!:"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            case $BUMP in
              major) NEW_TAG="v$((MAJOR+1)).0.0" ;;
              minor) NEW_TAG="v${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
            CHANGELOG=$(git log "${LATEST}..HEAD" --pretty=format:"* %s" --no-merges)
          fi
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          { echo "changelog<<EOF"; echo "$CHANGELOG"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          make_latest: true
