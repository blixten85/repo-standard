name: CI Autofix

on:
  workflow_run:
    workflows: ["<namn på repots CI-workflow, t.ex. \"CI\" eller \"Xcode-bygge (iOS + macOS)\">"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  notify-claude:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Ask Claude to investigate and fix the failure
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `@claude The **${run.name}** workflow failed on this PR (run: ${run.html_url}). Please investigate the failure and push a fix.`,
              });
            }
