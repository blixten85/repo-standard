name: Claude assign-trigger

# Loop-säker ersättning för "assignee" (GitHub tillåter bara riktiga
# collaborators/whitelistade bottar som assignees — ingen Claude-bot-identitet
# finns att tilldela). Istället: lägg på labeln "ask-claude" på en issue/PR
# så postas en @claude-kommentar som den redan installerade Claude GitHub App:en
# reagerar på (samma mekanism som ci-autofix.yml, som är etablerat säker).
#
# Varför detta INTE upprepar politiker-webapps kostnadsincident (1500 kr/6h):
# den händelsen triggades av att lyssna på ALLA kommentarer innehållande
# "@claude" (inkl. Claudes egna svar → oändlig loop). Den här workflown lyssnar
# bara på `labeled`-eventet, som GitHub bara avfyrar när en etikett faktiskt
# LÄGGS TILL (inte vid ompostning av en redan satt etikett) — så den kan bara
# triggas av en avsiktlig mänsklig handling, aldrig av sig själv.

on:
  issues:
    types: [labeled]
  # pull_request_target (inte pull_request): med den vanliga pull_request-triggern
  # tvingar GitHub fram ett read-only GITHUB_TOKEN för fork-PR:er, så
  # issues.createComment skulle ge 403 där. Säkert här eftersom workflowen aldrig
  # checkar ut eller kör någon kod från själva PR:en — bara postar en fast
  # textkommentar baserat på PR-numret.
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  notify-claude:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ask-claude'
    steps:
      - name: Be Claude investigate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const num = context.payload.issue?.number ?? context.payload.pull_request?.number;
            const kind = context.payload.pull_request ? 'PR:en' : 'issuen';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              body: `@claude Den här ${kind} har taggats med \`ask-claude\` — undersök och åtgärda.`,
            });
