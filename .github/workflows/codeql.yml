name: CodeQL

# Statisk säkerhetsanalys av SSHCore + bastion-cli (root-paketet). Kör inte
# mot App/ (Xcode-only) eller LinuxApp/ (eget paket) — root-paketet är där de
# säkerhetskänsliga ytorna bor (SSH-auth, nyckelparsning, Docker-kommando-
# validering mot injektion). Gratis för publika repon.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 0'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: swift
          build-mode: manual

      - name: "Bygg (root-paketet: SSHCore + bastion-cli)"
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/language:swift"
