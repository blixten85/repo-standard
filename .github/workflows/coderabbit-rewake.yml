name: CodeRabbit re-wake

# CodeRabbit återupptar INTE en rate-limitad granskning av sig själv — deras docs
# (docs.coderabbit.ai/management/plans) säger uttryckligen att man måste posta
# "@coderabbitai review" igen (eller pusha nya commits). Eftersom "CodeRabbit / Review"
# är en *required* status check i rulesetet "Protect main" står annars öppna PR:er
# still tills en människa petar dem manuellt.
#
# Det finns inget publikt rate-limit-status-API hos CodeRabbit — statusen läses av via
# GitHubs API: CodeRabbit postar själv en kommentar med "Review limit reached" +
# "Next review available in: N minutes". Den här cronen läser den kommentaren och
# re-triggar automatiskt så fort fönstret gått ut, en gång per rate-limit-notis
# (loop-skydd), så inget står still onödigt länge.

on:
  schedule:
    - cron: '*/15 * * * *'   # var 15:e minut
  workflow_dispatch:

permissions:
  pull-requests: write   # posta "@coderabbitai review"-kommentar
  contents: read
  checks: read

concurrency:
  group: coderabbit-rewake
  cancel-in-progress: false

jobs:
  rewake:
    runs-on: ubuntu-latest
    env:
      # Faller tillbaka på github.token om ingen PAT satts. Sätt secret CR_PAT
      # (fine-grained: Pull requests read/write) om CodeRabbit skulle ignorera
      # kommandon från github-actions[bot] — då kommer kommentaren från en riktig
      # användare i stället.
      GH_TOKEN: ${{ secrets.CR_PAT || github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Re-trigger CodeRabbit on rate-limited PRs
        run: |
          set -uo pipefail
          now=$(date +%s)
          NUDGE="@coderabbitai review"

          # Öppna PR:er (hoppa inte drafts — .coderabbit.yaml granskar även drafts).
          prs=$(gh pr list --state open --limit 100 --json number,headRefOid \
                  --jq '.[] | "\(.number) \(.headRefOid)"')
          [ -z "$prs" ] && { echo "Inga öppna PR:er."; exit 0; }

          while read -r pr sha; do
            [ -z "$pr" ] && continue
            echo "::group::PR #$pr"

            # CodeRabbit mitt i en granskning? Rör den inte.
            running=$(gh api "repos/$GH_REPO/commits/$sha/check-runs" \
                        --jq '[.check_runs[] | select(.name=="CodeRabbit / Review" and .status!="completed")] | length' 2>/dev/null || echo 0)
            if [ "${running:-0}" -gt 0 ]; then
              echo "CodeRabbit granskar redan (status!=completed) — skippar."
              echo "::endgroup::"; continue
            fi

            # --paginate kan ge sammanfogade arrayer per sida; `jq -s add` slår ihop
            # dem till EN array så max_by ser alla kommentarer, inte bara sida 1.
            comments=$(gh api "repos/$GH_REPO/issues/$pr/comments?per_page=100" --paginate 2>/dev/null | jq -s 'add // []' 2>/dev/null || echo '[]')

            # Nyaste CodeRabbit-kommentaren (summary-kommentaren redigeras in-place,
            # så updated_at speglar senaste tillståndet).
            # OBS: på issues/comments-REST-endpointen (till skillnad från gh pr view
            # --json comments, som normaliserar bort suffixet) är CodeRabbits
            # user.login bokstavligen "coderabbitai[bot]" — verifierat empiriskt.
            cr=$(printf '%s' "$comments" | jq -c '[.[] | select(.user.login=="coderabbitai[bot]")] | max_by(.updated_at) // empty')

            # Nyaste review-nudge från vem som helst UTOM CodeRabbit själv (loop-skydd:
            # en re-trigger per rate-limit-notis). Författar-agnostiskt så det funkar
            # både med github.token och CR_PAT, och respekterar manuella nudges.
            nudge_ts=$(printf '%s' "$comments" | jq -r '[.[] | select((.user.login != "coderabbitai[bot]") and (.body | test("@coderabbitai review")))] | max_by(.created_at).created_at // empty')
            nudge_epoch=0
            [ -n "$nudge_ts" ] && nudge_epoch=$(date -d "$nudge_ts" +%s)

            if [ -z "$cr" ]; then
              # CodeRabbit har aldrig kommenterat. Har den ens fått en check-run?
              has_check=$(gh api "repos/$GH_REPO/commits/$sha/check-runs" \
                            --jq '[.check_runs[] | select(.name=="CodeRabbit / Review")] | length' 2>/dev/null || echo 0)
              if [ "${has_check:-0}" -eq 0 ] && { [ "$nudge_epoch" -eq 0 ] || [ $((now - nudge_epoch)) -ge 2400 ]; }; then
                echo "Ingen CodeRabbit-aktivitet alls — nudgar en gång."
                gh pr comment "$pr" --body "$NUDGE" && echo "Nudge postad."
              else
                echo "Ingen CR-kommentar men check finns / redan nudgad nyligen — väntar."
              fi
              echo "::endgroup::"; continue
            fi

            body=$(printf '%s' "$cr" | jq -r .body)
            if ! printf '%s' "$body" | grep -qiE 'rate limited by coderabbit|Review limit reached'; then
              echo "Senaste CR-kommentaren är en riktig granskning (ej rate-limitad) — inget att göra."
              echo "::endgroup::"; continue
            fi

            # Rate-limitad. Parsa "Next review available in: N minutes" (default 40).
            n=$(printf '%s' "$body" | grep -oiP 'next review available in:[\s*]*\K[0-9]+' | head -1)
            [ -z "$n" ] && n=40
            limit_ts=$(printf '%s' "$cr" | jq -r .updated_at)
            limit_epoch=$(date -d "$limit_ts" +%s)
            ready_epoch=$((limit_epoch + n * 60))

            if [ "$now" -lt "$ready_epoch" ]; then
              echo "Rate-limitad — fönstret öppnar om $(( (ready_epoch - now + 59) / 60 )) min. Väntar."
            elif [ "$nudge_epoch" -ge "$limit_epoch" ]; then
              echo "Redan nudgad efter denna rate-limit-notis — väntar på CodeRabbits nästa svar."
            else
              echo "Fönstret öppet (rate-limit + $n min passerat) — re-triggar."
              gh pr comment "$pr" --body "$NUDGE" && echo "Nudge postad."
            fi
            echo "::endgroup::"
          done <<< "$prs"
