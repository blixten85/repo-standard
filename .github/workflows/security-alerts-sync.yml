name: Security Alerts Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch code scanning + Dependabot alerts (PAT)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;

            async function listAlerts(route) {
              try {
                return await github.paginate(route, { owner, repo, state: 'open', per_page: 100 });
              } catch (err) {
                // 404/403 means code scanning or Dependabot alerts aren't enabled/accessible here.
                if (err.status === 404 || err.status === 403) return null;
                throw err;
              }
            }

            const codeScanning = await listAlerts('GET /repos/{owner}/{repo}/code-scanning/alerts');
            const dependabot = await listAlerts('GET /repos/{owner}/{repo}/dependabot/alerts');

            fs.writeFileSync(
              `${process.env.RUNNER_TEMP}/security-alerts.json`,
              JSON.stringify({ codeScanning, dependabot })
            );

      - name: Sync open code scanning + Dependabot alerts to a pinned issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const title = '🔒 Open Security Alerts';

            const { codeScanning, dependabot } = JSON.parse(
              fs.readFileSync(`${process.env.RUNNER_TEMP}/security-alerts.json`, 'utf8')
            );

            const lines = [];
            lines.push(`_Last synced: ${new Date().toISOString()}_`);
            lines.push('');
            lines.push('## Code scanning alerts');
            if (codeScanning === null) {
              lines.push('_Not enabled, or not accessible to this workflow._');
            } else if (codeScanning.length === 0) {
              lines.push('No open code scanning alerts. ✅');
            } else {
              for (const a of codeScanning) {
                const rule = a.rule || {};
                const path = a.most_recent_instance && a.most_recent_instance.location
                  ? a.most_recent_instance.location.path : '';
                lines.push(`- [#${a.number}](${a.html_url}) **${rule.description || rule.id}** (${rule.severity || rule.security_severity_level || 'unknown'}) — \`${path}\``);
              }
            }
            lines.push('');
            lines.push('## Dependabot alerts');
            if (dependabot === null) {
              lines.push('_Not enabled, or not accessible to this workflow._');
            } else if (dependabot.length === 0) {
              lines.push('No open Dependabot alerts. ✅');
            } else {
              for (const a of dependabot) {
                const adv = a.security_advisory || {};
                const dep = a.dependency && a.dependency.package ? a.dependency.package.name : 'unknown';
                const severity = a.security_vulnerability ? a.security_vulnerability.severity : 'unknown';
                lines.push(`- [#${a.number}](${a.html_url}) **${dep}** — ${adv.summary || ''} (${severity})`);
              }
            }

            const body = lines.join('\n');

            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} in:title type:issue "${title}"`,
            });
            let issue = search.data.items.find((i) => i.title === title);

            if (!issue) {
              const created = await github.rest.issues.create({ owner, repo, title, body });
              issue = created.data;
              try {
                await github.graphql(
                  `mutation($id: ID!) { pinIssue(input: { issueId: $id }) { issue { id } } }`,
                  { id: issue.node_id }
                );
              } catch (err) {
                core.warning(`Could not pin issue: ${err.message}`);
              }
            } else {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, body });
              if (issue.state === 'closed') {
                await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'open' });
              }
            }
